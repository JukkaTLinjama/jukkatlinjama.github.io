<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elsi Vacuum App v0.4</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #151513;
      --panel: #22211f;
      --text: #efe8da;
      --muted: #b8ad9b;
      --line: rgba(255,255,255,0.12);
      --accent: #d8b66a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(216,182,106,0.11), transparent 34rem),
        linear-gradient(180deg, #211f1c 0%, var(--bg) 62%, #10100e 100%);
      color: var(--text);
    }
    main {
      width: min(820px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 16px 34px;
      display: grid;
      gap: 16px;
    }
    header { text-align: center; }
    h1 { margin: 0; font-size: clamp(34px, 9vw, 58px); letter-spacing: 0.04em; font-weight: 650; }
    .version { margin-top: 6px; color: var(--muted); font-size: 13px; }
    section {
      background: rgba(34,33,31,0.88);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.28);
      padding: 18px;
    }
    .transport { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    button {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #353128;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    button.primary { background: #5a4a2b; border-color: rgba(216,182,106,0.48); }
    button:disabled { opacity: 0.38; cursor: default; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    label.control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.035);
    }
    label.control span:first-child { font-size: 14px; }
    output { color: var(--muted); min-width: 5.5em; text-align: right; font-variant-numeric: tabular-nums; }
    input[type="range"] { grid-column: 1 / -1; width: 100%; }
    .status { min-height: 22px; color: var(--muted); text-align: center; font-size: 14px; margin-top: 10px; }
    pre {
      margin: 0;
      max-height: 340px;
      overflow: auto;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #0c0c0b;
      color: #d6d0c4;
      font-size: 12px;
      line-height: 1.35;
    }
    .note { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; text-align: center; }
    @media (max-width: 620px) { .transport { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>Elsi</h1>
    <div class="version">v0.4 · preprocessed motor wrap-crossfade test</div>
  </header>

  <section>
    <div class="transport">
      <button id="startBtn" class="primary">Start</button>
      <button id="stopBtn">Stop</button>
      <button id="reprocessBtn">Reprocess loop</button>
      <button id="stateBtn">Log state</button>
    </div>
    <div id="status" class="status">Ready. Uses assets/vacuum-loop.wav</div>
  </section>

  <section class="grid" aria-label="Runtime test controls">
    <label class="control">
      <span>Load</span>
      <output id="loadSigned01Out">0.00</output>
      <input id="loadSigned01" type="range" min="-1" max="1" step="0.01" value="0" />
    </label>

    <label class="control">
      <span>Load LFO depth</span>
      <output id="loadLfoDepth01Out">0.04</output>
      <input id="loadLfoDepth01" type="range" min="0" max="0.30" step="0.01" value="0.04" />
    </label>

    <label class="control">
      <span>Motor gain</span>
      <output id="motorVolume01Out">0.40</output>
      <input id="motorVolume01" type="range" min="0" max="1.5" step="0.01" value="0.40" />
    </label>

    <label class="control">
      <span>Motor preprocess overlap</span>
      <output id="motorPreprocessMsOut">120 ms</output>
      <input id="motorPreprocessMs" type="range" min="0" max="300" step="5" value="120" />
    </label>

    <label class="control">
      <span>Air volume</span>
      <output id="airVolume01Out">0.65</output>
      <input id="airVolume01" type="range" min="0" max="1" step="0.01" value="0.65" />
    </label>

    <label class="control">
      <span>Velvet low</span>
      <output id="velvetLow01Out">0.70</output>
      <input id="velvetLow01" type="range" min="0" max="1" step="0.01" value="0.70" />
    </label>

    <label class="control">
      <span>Velvet high</span>
      <output id="velvetHigh01Out">0.60</output>
      <input id="velvetHigh01" type="range" min="0" max="1" step="0.01" value="0.60" />
    </label>

    <label class="control">
      <span>Harmonic noise</span>
      <output id="harmonicNoise01Out">0.75</output>
      <input id="harmonicNoise01" type="range" min="0" max="1" step="0.01" value="0.75" />
    </label>

    <label class="control">
      <span>Master volume</span>
      <output id="masterVolume01Out">0.70</output>
      <input id="masterVolume01" type="range" min="0" max="1" step="0.01" value="0.70" />
    </label>
  </section>

  <section>
    <pre id="debugView"></pre>
  </section>

  <p class="note">Motor playback uses one native-looping source, but only after creating a preprocessed cyclic buffer with a wrap-crossfade. Noise layers still use simple native loops because they are non-tonal masks.</p>
</main>

<script>
(() => {
  "use strict";

  const VERSION = "elsi-vacuum-app-v0.4";
  const DEFAULT_SAMPLE_URL = "assets/vacuum-loop.wav";
  const LOAD_LFO_MIN_PERIOD_SEC = 3;
  const LOAD_LFO_MAX_PERIOD_SEC = 8;

  const ui = {
    startBtn: document.getElementById("startBtn"),
    stopBtn: document.getElementById("stopBtn"),
    reprocessBtn: document.getElementById("reprocessBtn"),
    stateBtn: document.getElementById("stateBtn"),
    status: document.getElementById("status"),
    debugView: document.getElementById("debugView")
  };

  const controlKeys = [
    "loadSigned01",
    "loadLfoDepth01",
    "motorVolume01",
    "motorPreprocessMs",
    "airVolume01",
    "velvetLow01",
    "velvetHigh01",
    "harmonicNoise01",
    "masterVolume01"
  ];

  const state = {
    audioCtx: null,
    masterGain: null,
    motorGain: null,
    airGain: null,
    harmonicNoiseGain: null,
    velvetLowGain: null,
    velvetHighGain: null,
    motorSource: null,
    airSourceA: null,
    airSourceB: null,
    harmonicNoiseSource: null,
    velvetLowSource: null,
    velvetHighSource: null,
    rawSampleBuffer: null,
    processedMotorBuffer: null,
    lastProcessInfo: null,
    isLoadingSample: false,
    isRunning: false,
    loadLfoTimer: null,
    loadLfo: {
      phase: 0,
      value: 0,
      effectiveLoad: 0,
      currentPeriodSec: LOAD_LFO_MIN_PERIOD_SEC,
      lastTimeSec: null
    },
    controls: {
      load01: 0,
      loadLfoDepth01: 0.04,
      motorVolume01: 0.40,
      motorPreprocessMs: 120,
      airVolume01: 0.65,
      velvetLow01: 0.70,
      velvetHigh01: 0.60,
      harmonicNoise01: 0.75,
      masterVolume01: 0.70
    }
  };

  function setStatus(message) { ui.status.textContent = message; }
  function clamp(value, min, max) {
    const n = Number(value);
    if (!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }
  function clamp01(value) { return clamp(value, 0, 1); }
  function clampSigned01(value) { return clamp(value, -1, 1); }
  function dbToGain(db) { return Math.pow(10, db / 20); }

  function createAudioContextIfNeeded() {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      state.masterGain = state.audioCtx.createGain();
      state.motorGain = state.audioCtx.createGain();
      state.airGain = state.audioCtx.createGain();
      state.harmonicNoiseGain = state.audioCtx.createGain();
      state.velvetLowGain = state.audioCtx.createGain();
      state.velvetHighGain = state.audioCtx.createGain();

      state.motorGain.connect(state.masterGain);
      state.airGain.connect(state.masterGain);
      state.harmonicNoiseGain.connect(state.masterGain);
      state.velvetLowGain.connect(state.masterGain);
      state.velvetHighGain.connect(state.masterGain);
      state.masterGain.connect(state.audioCtx.destination);

      state.masterGain.gain.value = 0;
      state.motorGain.gain.value = 0;
      state.airGain.gain.value = 0;
      state.harmonicNoiseGain.gain.value = 0;
      state.velvetLowGain.gain.value = 0;
      state.velvetHighGain.gain.value = 0;
    }
    return state.audioCtx;
  }

  async function decodeArrayBuffer(arrayBuffer) {
    const audioCtx = createAudioContextIfNeeded();
    return await audioCtx.decodeAudioData(arrayBuffer.slice(0));
  }

  async function loadDefaultSample() {
    if (state.rawSampleBuffer || state.isLoadingSample) return state.rawSampleBuffer;
    state.isLoadingSample = true;
    try {
      setStatus(`Loading ${DEFAULT_SAMPLE_URL}...`);
      const response = await fetch(DEFAULT_SAMPLE_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const arrayBuffer = await response.arrayBuffer();
      state.rawSampleBuffer = await decodeArrayBuffer(arrayBuffer);
      preprocessMotorLoopFromCurrentSettings();
      setStatus("Sample loaded and preprocessed. Ready.");
      updateDebugView();
      return state.rawSampleBuffer;
    } catch (err) {
      console.error(err);
      setStatus("Could not load assets/vacuum-loop.wav.");
      return null;
    } finally {
      state.isLoadingSample = false;
    }
  }

  function preprocessMotorLoop(rawBuffer, crossfadeMs) {
    const ctx = createAudioContextIfNeeded();
    const requestedFadeSamples = Math.round(rawBuffer.sampleRate * Math.max(0, crossfadeMs) / 1000);
    const maxFadeSamples = Math.floor(rawBuffer.length * 0.45);
    const fadeSamples = Math.max(0, Math.min(requestedFadeSamples, maxFadeSamples));

    if (fadeSamples < 2) {
      const copy = ctx.createBuffer(rawBuffer.numberOfChannels, rawBuffer.length, rawBuffer.sampleRate);
      for (let ch = 0; ch < rawBuffer.numberOfChannels; ch++) {
        copy.copyToChannel(rawBuffer.getChannelData(ch), ch, 0);
      }
      return {
        buffer: copy,
        info: {
          requestedMs: crossfadeMs,
          actualMs: 0,
          fadeSamples: 0,
          rawLengthSamples: rawBuffer.length,
          processedLengthSamples: copy.length,
          method: "copy-no-crossfade"
        }
      };
    }

    // Standard cyclic wrap-crossfade:
    // Output length becomes N - F. At native-loop wrap, the first samples continue
    // from the original tail and then fade into the original head. This avoids a
    // zero-window amplitude dip and keeps runtime playback to one looping source.
    const processedLength = rawBuffer.length - fadeSamples;
    const processed = ctx.createBuffer(rawBuffer.numberOfChannels, processedLength, rawBuffer.sampleRate);

    for (let ch = 0; ch < rawBuffer.numberOfChannels; ch++) {
      const src = rawBuffer.getChannelData(ch);
      const dst = processed.getChannelData(ch);

      for (let i = 0; i < processedLength; i++) {
        dst[i] = src[i] || 0;
      }

      for (let i = 0; i < fadeSamples; i++) {
        const t = i / Math.max(1, fadeSamples - 1);
        const fadeIn = Math.sin(t * Math.PI * 0.5);
        const fadeOut = Math.cos(t * Math.PI * 0.5);
        const head = src[i] || 0;
        const tail = src[processedLength + i] || 0;
        dst[i] = tail * fadeOut + head * fadeIn;
      }
    }

    return {
      buffer: processed,
      info: {
        requestedMs: crossfadeMs,
        actualMs: fadeSamples / rawBuffer.sampleRate * 1000,
        fadeSamples,
        rawLengthSamples: rawBuffer.length,
        processedLengthSamples: processed.length,
        method: "wrap-crossfade-at-loop-start"
      }
    };
  }

  function preprocessMotorLoopFromCurrentSettings() {
    if (!state.rawSampleBuffer) return false;
    const result = preprocessMotorLoop(state.rawSampleBuffer, state.controls.motorPreprocessMs);
    state.processedMotorBuffer = result.buffer;
    state.lastProcessInfo = result.info;
    if (state.isRunning) restartMotorSource();
    updateDebugView();
    return true;
  }

  function createNoiseBuffer(audioCtx, seconds, highpassHint) {
    const length = Math.max(1, Math.floor(audioCtx.sampleRate * seconds));
    const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let previous = 0;
    for (let i = 0; i < length; i++) {
      const white = Math.random() * 2 - 1;
      previous = previous * 0.92 + white * 0.08;
      data[i] = highpassHint ? ((white - previous) * 0.03 + previous * 0.32) : previous * 0.50;
    }
    return buffer;
  }

  function createVelvetNoiseBuffer(audioCtx, seconds, impulsesPerSecond, tone) {
    const length = Math.max(1, Math.floor(audioCtx.sampleRate * seconds));
    const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    const impulseCount = Math.max(1, Math.floor(seconds * impulsesPerSecond));

    for (let n = 0; n < impulseCount; n++) {
      const index = Math.floor(Math.random() * length);
      const sign = Math.random() < 0.5 ? -1 : 1;
      const grainSamples = tone === "low" ? 220 : 110;
      const decay = tone === "low" ? 110 : 55;
      const amp = tone === "low" ? 0.34 : 0.20;
      for (let k = 0; k < grainSamples && index + k < length; k++) {
        const t = k / Math.max(1, grainSamples - 1);
        const env = Math.sin(t * Math.PI) * Math.exp(-k / decay);
        data[index + k] += sign * env * amp;
      }
    }

    let prev = 0;
    for (let i = 0; i < length; i++) {
      prev = prev * 0.88 + data[i] * 0.12;
      data[i] = prev;
    }

    let sumSquares = 0;
    for (let i = 0; i < length; i++) sumSquares += data[i] * data[i];
    const rms = Math.sqrt(sumSquares / Math.max(1, length));
    const targetRms = tone === "low" ? 0.10 : 0.07;
    if (rms > 1e-9) {
      const scale = targetRms / rms;
      for (let i = 0; i < length; i++) data[i] = Math.max(-1, Math.min(1, data[i] * scale));
    }
    return buffer;
  }

  function createLoopingBufferSource(buffer, playbackRate = 1) {
    const source = state.audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    source.playbackRate.value = playbackRate;
    return source;
  }

  function stopSource(source) {
    if (!source) return;
    try { source.stop(); } catch (err) {}
    try { source.disconnect(); } catch (err) {}
  }

  function refreshEffectiveLoadFromCurrentLfo() {
    state.loadLfo.effectiveLoad = clampSigned01(
      state.controls.load01 + state.controls.loadLfoDepth01 * state.loadLfo.value
    );
    return state.loadLfo.effectiveLoad;
  }

  function updateLoadLfoState(nowSec) {
    const lfo = state.loadLfo;
    if (lfo.lastTimeSec === null) {
      lfo.lastTimeSec = nowSec;
      refreshEffectiveLoadFromCurrentLfo();
      return;
    }
    const dt = Math.max(0, Math.min(0.25, nowSec - lfo.lastTimeSec));
    lfo.lastTimeSec = nowSec;
    const periodMod01 = 0.5 + 0.5 * Math.sin(nowSec * 0.13);
    lfo.currentPeriodSec = LOAD_LFO_MIN_PERIOD_SEC + periodMod01 * (LOAD_LFO_MAX_PERIOD_SEC - LOAD_LFO_MIN_PERIOD_SEC);
    lfo.phase = (lfo.phase + dt / Math.max(0.001, lfo.currentPeriodSec)) % 1;
    lfo.value = Math.sin(lfo.phase * Math.PI * 2);
    refreshEffectiveLoadFromCurrentLfo();
  }

  function getLoadForMapping() { return refreshEffectiveLoadFromCurrentLfo(); }

  function computeMappedControls() {
    const load = getLoadForMapping();
    const loadUp = Math.max(0, load);
    const loadDown = Math.max(0, -load);
    const playbackRate = 1.0 + load * 0.50;
    const motorLoadGain = dbToGain(loadUp * 3.0);
    const airLoadGain = dbToGain(-12.0 + loadUp * -6.0 + loadDown * -2.0);
    const harmonicLoadGain = dbToGain(-4 + loadUp * 8 - loadDown * 2);
    const velvetLowLoadGain = dbToGain(-4 - loadUp * 1 + loadDown * 1);
    const velvetHighLoadGain = dbToGain(-7 + loadUp * 4 - loadDown * 2);

    return {
      playbackRate,
      motorGain: state.controls.motorVolume01 * motorLoadGain,
      airGain: state.controls.airVolume01 * airLoadGain,
      harmonicNoiseGain: state.controls.harmonicNoise01 * harmonicLoadGain,
      velvetLowGain: state.controls.velvetLow01 * velvetLowLoadGain,
      velvetHighGain: state.controls.velvetHigh01 * velvetHighLoadGain,
      masterGain: state.controls.masterVolume01
    };
  }

  function applyControls(rampSeconds = 0.08) {
    if (!state.audioCtx || !state.masterGain) return;
    const now = state.audioCtx.currentTime;
    const mapped = computeMappedControls();

    if (state.motorSource) {
      state.motorSource.playbackRate.setTargetAtTime(mapped.playbackRate, now, rampSeconds);
    }

    state.motorGain.gain.setTargetAtTime(mapped.motorGain, now, rampSeconds);
    state.airGain.gain.setTargetAtTime(mapped.airGain, now, rampSeconds);
    state.harmonicNoiseGain.gain.setTargetAtTime(mapped.harmonicNoiseGain, now, rampSeconds);
    state.velvetLowGain.gain.setTargetAtTime(mapped.velvetLowGain, now, rampSeconds);
    state.velvetHighGain.gain.setTargetAtTime(mapped.velvetHighGain, now, rampSeconds);
    state.masterGain.gain.setTargetAtTime(mapped.masterGain, now, rampSeconds);
    updateDebugView();
  }

  function startMotorSource() {
    if (!state.audioCtx || !state.processedMotorBuffer) return false;
    const mapped = computeMappedControls();
    const source = createLoopingBufferSource(state.processedMotorBuffer, mapped.playbackRate);
    source.connect(state.motorGain);
    source.start(state.audioCtx.currentTime + 0.02);
    state.motorSource = source;
    return true;
  }

  function restartMotorSource() {
    if (!state.audioCtx || !state.isRunning || !state.processedMotorBuffer) return false;
    const oldSource = state.motorSource;
    startMotorSource();
    if (oldSource) {
      try { oldSource.stop(state.audioCtx.currentTime + 0.04); } catch (err) {}
      setTimeout(() => stopSource(oldSource), 90);
    }
    applyControls(0.04);
    return true;
  }

  function startLoadLfoUpdater() {
    if (state.loadLfoTimer) return;
    if (state.audioCtx) state.loadLfo.lastTimeSec = state.audioCtx.currentTime;
    state.loadLfoTimer = setInterval(() => {
      if (!state.audioCtx || !state.isRunning) return;
      updateLoadLfoState(state.audioCtx.currentTime);
      applyControls(0.12);
    }, 50);
  }

  function stopLoadLfoUpdater() {
    clearInterval(state.loadLfoTimer);
    state.loadLfoTimer = null;
    state.loadLfo.lastTimeSec = null;
  }

  async function startAudio() {
    const audioCtx = createAudioContextIfNeeded();
    await audioCtx.resume();
    await loadDefaultSample();
    if (!state.processedMotorBuffer) {
      setStatus("No processed motor buffer. Check assets/vacuum-loop.wav.");
      return false;
    }
    if (state.isRunning) return true;

    updateLoadLfoState(audioCtx.currentTime);
    state.airSourceA = createLoopingBufferSource(createNoiseBuffer(audioCtx, 2.3, false), 1);
    state.airSourceB = createLoopingBufferSource(createNoiseBuffer(audioCtx, 3.1, true), 1);
    state.harmonicNoiseSource = createLoopingBufferSource(createNoiseBuffer(audioCtx, 1.7, true), 1);
    state.velvetLowSource = createLoopingBufferSource(createVelvetNoiseBuffer(audioCtx, 4.7, 1200, "low"), 1);
    state.velvetHighSource = createLoopingBufferSource(createVelvetNoiseBuffer(audioCtx, 3.9, 1800, "high"), 1);

    state.airSourceA.connect(state.airGain);
    state.airSourceB.connect(state.airGain);
    state.harmonicNoiseSource.connect(state.harmonicNoiseGain);
    state.velvetLowSource.connect(state.velvetLowGain);
    state.velvetHighSource.connect(state.velvetHighGain);

    const now = audioCtx.currentTime;
    state.masterGain.gain.cancelScheduledValues(now);
    state.masterGain.gain.setValueAtTime(0, now);

    startMotorSource();
    state.airSourceA.start(now);
    state.airSourceB.start(now);
    state.harmonicNoiseSource.start(now);
    state.velvetLowSource.start(now);
    state.velvetHighSource.start(now);

    state.isRunning = true;
    applyControls(0.12);
    startLoadLfoUpdater();
    setStatus("Running. Motor uses one preprocessed native-loop source.");
    updateTransportUi();
    return true;
  }

  function stopAudio() {
    if (!state.audioCtx || !state.isRunning) return false;
    stopLoadLfoUpdater();
    const now = state.audioCtx.currentTime;
    const stopAt = now + 0.18;
    state.masterGain.gain.cancelScheduledValues(now);
    state.masterGain.gain.setValueAtTime(state.masterGain.gain.value, now);
    state.masterGain.gain.linearRampToValueAtTime(0.0001, stopAt);

    const sources = [
      state.motorSource,
      state.airSourceA,
      state.airSourceB,
      state.harmonicNoiseSource,
      state.velvetLowSource,
      state.velvetHighSource
    ];

    setTimeout(() => {
      sources.forEach(stopSource);
      state.motorSource = null;
      state.airSourceA = null;
      state.airSourceB = null;
      state.harmonicNoiseSource = null;
      state.velvetLowSource = null;
      state.velvetHighSource = null;
      state.isRunning = false;
      setStatus("Stopped.");
      updateTransportUi();
      updateDebugView();
    }, 220);
    return true;
  }

  function updateControl(params = {}) {
    if (typeof params.loadSigned01 === "number") state.controls.load01 = clampSigned01(params.loadSigned01);
    else if (typeof params.load01 === "number") state.controls.load01 = clampSigned01(params.load01 * 2 - 1);

    if (typeof params.loadLfoDepth01 === "number") state.controls.loadLfoDepth01 = clamp(params.loadLfoDepth01, 0, 0.30);
    if (typeof params.motorVolume01 === "number") state.controls.motorVolume01 = clamp(params.motorVolume01, 0, 1.5);
    if (typeof params.motorPreprocessMs === "number") state.controls.motorPreprocessMs = clamp(params.motorPreprocessMs, 0, 300);
    if (typeof params.airVolume01 === "number") state.controls.airVolume01 = clamp01(params.airVolume01);
    if (typeof params.velvetLow01 === "number") state.controls.velvetLow01 = clamp01(params.velvetLow01);
    if (typeof params.velvetHigh01 === "number") state.controls.velvetHigh01 = clamp01(params.velvetHigh01);
    if (typeof params.harmonicNoise01 === "number") state.controls.harmonicNoise01 = clamp01(params.harmonicNoise01);
    if (typeof params.masterVolume01 === "number") state.controls.masterVolume01 = clamp01(params.masterVolume01);

    refreshEffectiveLoadFromCurrentLfo();
    applyControls(0.08);
    syncUiFromState();
    return getState();
  }

  async function start() { await startAudio(); return getState(); }
  function stop() { stopAudio(); return getState(); }

  function reprocessMotorLoop() {
    const ok = preprocessMotorLoopFromCurrentSettings();
    setStatus(ok ? `Reprocessed motor loop: ${Math.round(state.lastProcessInfo.actualMs)} ms wrap-crossfade.` : "No sample to reprocess.");
    syncUiFromState();
    return getState();
  }

  function getState() {
    const mapped = computeMappedControls();
    return {
      version: VERSION,
      isRunning: state.isRunning,
      hasSample: Boolean(state.rawSampleBuffer),
      hasProcessedMotorBuffer: Boolean(state.processedMotorBuffer),
      isLoadingSample: state.isLoadingSample,
      sample: state.rawSampleBuffer ? {
        rawDurationSec: state.rawSampleBuffer.duration,
        processedDurationSec: state.processedMotorBuffer ? state.processedMotorBuffer.duration : null,
        sampleRate: state.rawSampleBuffer.sampleRate,
        channels: state.rawSampleBuffer.numberOfChannels
      } : null,
      controls: { ...state.controls, loadSigned01: state.controls.load01 },
      loadLfo: { ...state.loadLfo },
      mapped,
      motorLoop: {
        activeVoices: state.motorSource ? 1 : 0,
        nativeLoopUsedForMotor: true,
        processedLoop: true,
        processInfo: state.lastProcessInfo
      }
    };
  }

  window.vacuumSampleLabApi = Object.freeze({
    updateControl,
    start,
    stop,
    getState,
    reprocessMotorLoop
  });

  function syncUiFromState() {
    const values = {
      loadSigned01: state.controls.load01,
      loadLfoDepth01: state.controls.loadLfoDepth01,
      motorVolume01: state.controls.motorVolume01,
      motorPreprocessMs: state.controls.motorPreprocessMs,
      airVolume01: state.controls.airVolume01,
      velvetLow01: state.controls.velvetLow01,
      velvetHigh01: state.controls.velvetHigh01,
      harmonicNoise01: state.controls.harmonicNoise01,
      masterVolume01: state.controls.masterVolume01
    };

    controlKeys.forEach(key => {
      const input = document.getElementById(key);
      const output = document.getElementById(`${key}Out`);
      if (input && document.activeElement !== input) input.value = String(values[key]);
      if (output) output.value = key === "motorPreprocessMs" ? `${Math.round(values[key])} ms` : Number(values[key]).toFixed(2);
    });
  }

  function updateTransportUi() {
    ui.startBtn.disabled = state.isRunning;
    ui.stopBtn.disabled = !state.isRunning;
  }

  function updateDebugView() {
    if (!ui.debugView) return;
    ui.debugView.textContent = JSON.stringify(getState(), null, 2);
  }

  function bindUi() {
    ui.startBtn.addEventListener("click", () => {
      start().catch(err => {
        console.error(err);
        setStatus(String(err && err.message ? err.message : err));
      });
    });
    ui.stopBtn.addEventListener("click", () => stop());
    ui.reprocessBtn.addEventListener("click", () => reprocessMotorLoop());
    ui.stateBtn.addEventListener("click", () => {
      console.log("vacuumSampleLabApi.getState()", getState());
      updateDebugView();
    });
    controlKeys.forEach(key => {
      const input = document.getElementById(key);
      if (!input) return;
      input.addEventListener("input", () => {
        const params = {};
        params[key] = Number(input.value);
        updateControl(params);
      });
    });
  }

  bindUi();
  syncUiFromState();
  updateTransportUi();
  updateDebugView();
  loadDefaultSample();
})();
</script>
</body>
</html>
