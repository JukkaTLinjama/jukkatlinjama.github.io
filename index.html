<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Jukka Linjama – Demos</title>

    <style>
        :root {
            --bg: #1f2126;
            --bg-soft: #292c33;
            --card: #30343c;
            --text: #f1f3f5;
            --muted: #b9c0c9;
            --accent: #8fd3ff;
            --accent-hover: #b7e4ff;
            --border: rgba(255, 255, 255, 0.12);
            --shadow: rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(143, 211, 255, 0.13), transparent 30rem),
                linear-gradient(135deg, var(--bg), var(--bg-soft));
            color: var(--text);
            line-height: 1.55;
        }

        main {
            width: min(760px, 100%);
            padding: clamp(32px, 6vw, 56px);
            border: 1px solid var(--border);
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.025)),
                var(--card);
            box-shadow: 0 28px 90px var(--shadow);
        }

        .eyebrow {
            margin: 0 0 14px;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2.2rem, 7vw, 4.4rem);
            line-height: 0.95;
            letter-spacing: -0.06em;
        }

        .created-by {
            margin: 0 0 10px;
            color: var(--text);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 600;
        }

        .version {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .description {
            max-width: 620px;
            margin: 0 0 34px;
            color: var(--muted);
            font-size: clamp(1.05rem, 2vw, 1.28rem);
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 34px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 20px;
            border-radius: 999px;
            font-weight: 750;
            text-decoration: none;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .button:hover {
            transform: translateY(-1px);
            text-decoration: none;
        }

        .button.primary {
            background: var(--accent);
            color: #071018;
        }

        .button.primary:hover {
            background: var(--accent-hover);
        }

        .button.secondary {
            border: 1px solid var(--border);
            color: var(--text);
            background: rgba(255, 255, 255, 0.035);
        }

        .button.secondary:hover {
            border-color: rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.065);
        }

        footer {
            padding-top: 22px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.95rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            body {
                place-items: start center;
                padding-top: 32px;
            }

            .links {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main>
        <p class="eyebrow">Interactive web demos</p>

        <h1>Audio Coding Demos</h1>

        <p class="created-by">Created by Jukka Linjama</p>

        <p class="version">Version 1.0 · 17 May 2026</p>

        <p class="description">
            Browser-based experiments for audio analysis, Web Audio, tactile perception
            and multisensory prototypes.
        </p>

        <div class="links">
            <!-- Opens the main audio-coding demo collection in a new browser tab. -->
            <a class="button primary" href="https://jukkatlinjama.github.io/audio-coding/" target="_blank"
                rel="noopener">
                Open audio-coding demos
            </a>

            <!-- Opens the GitHub profile in a new browser tab. -->
            <a class="button secondary" href="https://github.com/JukkaTLinjama" target="_blank" rel="noopener">
                GitHub profile
            </a>
        </div>

        <footer>
            © Jukka Linjama ·
            <a href="https://www.aistipaja.fi" target="_blank" rel="noopener">Aistipaja</a>
        </footer>
    </main>
</body>

</html>
